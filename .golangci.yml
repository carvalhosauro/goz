run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - unparam
    - prealloc
    - gocritic
    - gosec
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - exhaustive
    - nilerr
    - noctx
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - stylecheck
    - tparallel
    - whitespace

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: exported
        disabled: true
  gosec:
    excludes:
      - G104
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam
  max-issues-per-linter: 0
  max-same-issues: 0
